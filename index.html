<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veyrox Dev</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#0d0d0d,#1a0000,#2b0000);
    color:white;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    width:300px;
    height:300px;
    background:red;
    filter:blur(150px);
    top:-80px;
    right:-80px;
    opacity:0.5;
}

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:35px 20px;
    text-align:center;
}

.profile{
    animation:fade 1s ease;
}

.profile img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid #ff2b2b;
    object-fit:cover;
    box-shadow:0 0 30px rgba(255,0,0,0.7);
}

h1{
    margin-top:18px;
    font-size:34px;
    font-weight:700;
}

.bio{
    margin-top:8px;
    color:#d1d1d1;
    font-size:15px;
}

.badge{
    margin-top:12px;
    display:inline-block;
    background:#ff1f1f;
    padding:7px 18px;
    border-radius:50px;
    font-size:13px;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.links{
    margin-top:35px;
}

.link{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    margin:16px 0;
    padding:18px;
    border-radius:22px;
    font-size:18px;
    font-weight:600;
    transition:0.25s;
    box-shadow:0 0 20px rgba(255,0,0,0.08);
}

.link:hover{
    transform:translateY(-4px) scale(1.02);
    background:#ff1f1f;
    box-shadow:0 0 25px rgba(255,0,0,0.6);
}

.icon{
    font-size:22px;
}

.footer{
    margin-top:35px;
    color:#b8b8b8;
    font-size:13px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
<body>

<div class="container">

<div class="profile">
<img src="https://i.imgur.com/8Km9tLL.png">

<h1>Veyrox Dev</h1>

<div class="bio">
Open Jasa Website • Design • Editing
</div>

<div class="badge">
SMK RPL Vibes ⚡
</div>
</div>

<div class="links">

<span class="icon">💬</span>

</a>

<span class="icon">📸</span>

<span class="icon">🎵</span>

</a>

<a class="link" href="#">

</a>

</div>

<div class="footer">
© 2026 Veyrox Dev
</div>

</div>

</body>
</html>
